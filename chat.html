<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking RAG Chatbot</title>
<style>
  :root {
    --bg: #f4f6f9;
    --panel: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --brand: #1f4e79;
    --brand-soft: #e8eef5;
    --border: #e3e8ef;
    --user: #1f4e79;
    --bot: #f0f3f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--panel);
    border-left: 1px solid #e3e8ef;
    border-right: 1px solid #e3e8ef;
  }
  header {
    padding: 16px 20px;
    background: var(--brand);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; opacity: .8; margin-top: 2px; }
  select {
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.4);
    background: rgba(255,255,255,.12);
    color: #fff;
    cursor: pointer;
  }
  select option { color: #1f2937; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 88%; line-height: 1.5; font-size: 14.5px; }
  .msg.user {
    align-self: flex-end;
    background: var(--user);
    color: #fff;
    padding: 10px 14px;
    border-radius: 14px 14px 4px 14px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bot);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 14px 14px 14px 4px;
    white-space: pre-wrap;
  }
  .sources {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #cbd5e1;
    font-size: 12px;
    color: var(--muted);
  }
  .sources b { color: var(--brand); font-weight: 600; }
  .sources ul { margin: 4px 0 0; padding-left: 18px; }
  .hint { color: var(--muted); font-size: 13px; text-align: center; margin-top: 30px; }
  .typing { font-style: italic; color: var(--muted); }
  footer {
    padding: 14px 16px;
    border-top: 1px solid #e3e8ef;
    display: flex;
    gap: 10px;
  }
  #q {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 14.5px;
    outline: none;
  }
  #q:focus { border-color: var(--brand); }
  button.send {
    padding: 0 20px;
    border: none;
    border-radius: 10px;
    background: var(--brand);
    color: #fff;
    font-size: 14.5px;
    cursor: pointer;
  }
  button.send:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Banking RAG Chatbot</h1>
      <div class="sub">Answers from your ingested documents</div>
    </div>
    <select id="model" title="Choose the LLM">
      <option value="llama3.2">llama3.2</option>
      <option value="mistral">mistral</option>
    </select>
  </header>

  <div id="messages">
    <div class="hint">Ask a question about the banking documents.<br>
      e.g. "What is the minimum balance for a savings account?"</div>
  </div>

  <footer>
    <input id="q" type="text" placeholder="Type your question..." autocomplete="off">
    <button class="send" id="send">Send</button>
  </footer>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("q");
  const sendBtn = document.getElementById("send");
  const modelSel = document.getElementById("model");

  function addUser(text) {
    const d = document.createElement("div");
    d.className = "msg user";
    d.textContent = text;
    messagesEl.appendChild(d);
    scrollDown();
  }

  function addBot(text, sources) {
    const d = document.createElement("div");
    d.className = "msg bot";
    d.textContent = text;
    if (sources && sources.length) {
      const s = document.createElement("div");
      s.className = "sources";
      const items = sources.map(x => `<li>${x}</li>`).join("");
      s.innerHTML = `<b>Sources</b><ul>${items}</ul>`;
      d.appendChild(s);
    }
    messagesEl.appendChild(d);
    scrollDown();
  }

  function addTyping() {
    const d = document.createElement("div");
    d.className = "msg bot typing";
    d.id = "typing";
    d.textContent = "Thinking...";
    messagesEl.appendChild(d);
    scrollDown();
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function scrollDown() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function ask() {
    const question = input.value.trim();
    if (!question) return;

    // clear the initial hint on first message
    const hint = messagesEl.querySelector(".hint");
    if (hint) hint.remove();

    addUser(question);
    input.value = "";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, model: modelSel.value }),
      });
      const data = await res.json();
      removeTyping();
      addBot(data.answer, data.sources);
    } catch (e) {
      removeTyping();
      addBot("Network error: could not reach the server.", []);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", ask);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") ask();
  });
  input.focus();
</script>
</body>
</html>
